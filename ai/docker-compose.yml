services:
  postgres:
    image: postgres:16-alpine
    container_name: metrolinea-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metrolinea}
      POSTGRES_USER: ${POSTGRES_USER:-metrolinea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metrolinea}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metrolinea}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: metrolinea-backend
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
    restart: unless-stopped

  metrolinea-ai:
    build: .
    container_name: metrolinea-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/srv/app
      - ./data:/srv/data
      - ./models:/srv/models
    restart: unless-stopped

  counter:
    build:
      context: ../counter
      dockerfile: Dockerfile
    container_name: metrolinea-counter
    ports:
      - "8001:8001"
    environment:
      BACKEND_URL: "http://metrolinea-backend:3000"
      DEFAULT_CAPACITY: "50"
    volumes:
      - ../counter/app:/srv/app
    depends_on:
      - metrolinea-ai
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: metrolinea-dashboard
    ports:
      - "5173:5173"          # acceso directo desde host: http://localhost:5173/app
    environment:
      VITE_BASE_URL: /app
    volumes:
      - ../dashboard:/app
      - /app/node_modules    # anonymous volume → conserva node_modules del build
    restart: unless-stopped

  mobile:
    build:
      context: ../mobile
      dockerfile: Dockerfile
    container_name: metrolinea-mobile
    ports:
      - "5174:5174"          # acceso directo desde celular: http://<IP_LAN>:5174
    environment:
      VITE_BASE_URL: /mobile
    volumes:
      - ../mobile:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: metrolinea-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - dashboard
      - mobile
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: metrolinea-ngrok
    command: http nginx:80
    env_file:
      - ../.env
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data:
